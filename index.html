<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join</title>
    <script src="./js/main.js" defer></script>
    <link rel="stylesheet" href="./css/root.css" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./css/btn.css" />
    <link rel="stylesheet" href="./css/login.css" />
    <link rel="stylesheet" href="./css/summary-dashboard.css" />
    <link rel="stylesheet" href="./css/add-task.css" />
    <link rel="stylesheet" href="./css/contacts.css" />
  </head>
  <body>
    <div class="content-wrapper">

      <sektion class="welcome-section">
        <img src="./assets/logos/main-logo.svg" alt="Join Logo" class="join-logo">
          <div class="signup-container">
            <p class="p-welcome">Not a Join User?</p>
            <button id="signup-btn" class="signup-btn">Sign Up</button>
          </div>
      </sektion>
    <sektion class="login-container">
      <h1 class="h1-login">Log in</h1>
      <hr class="login-hr">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      
      <div class="login_btn-container">
        <button id="login-btn">Log in</button>
       <button id="guest-btn">Guest Log in</button>
      </div>
    </sektion>

    </div>
    <script src="js/template.js" defer></script>
    <script src="js/storage.js" defer></script>
    <script src="js/task.js" defer></script>
    <script src="js/contact.js" defer></script>
    <script src="js/drag-and-drop.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>

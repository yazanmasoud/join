<header>
  <div class="header-inner">
    <div class="header-center">
      <p class="header-left">Kanban Project Management Tool</p>
    </div>

    <div class="header-right">
      <div class="help-icon" onclick="navigateTo('help'); openHelp();">
        <img src="../assets/icons/help-icon.svg" alt="Help">
      </div>
      <div id="headerAvatar" class="header-avatar" onclick="toggleAvatarDropdown(event)">SM</div>
      <div id="avatarDropdown" onclick="event.stopPropagation()" class="avatar-dropdown">
        <a class="avatar-dropdown-item" href="#" onclick="navigateTo('legal-notice'); closeAvatarDropdown();">Legal Notice</a>
        <a class="avatar-dropdown-item" href="#" onclick="navigateTo('privacy-policy'); closeAvatarDropdown();">Privacy Policy</a>
        <a class="avatar-dropdown-item" href="#" onclick="logOut();">Log out</a>
      </div>
    </div>
  </div>

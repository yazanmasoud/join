<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summary Dashboard</title>
    <link rel="stylesheet" href="../css/root.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/btn.css" />
    <link rel="stylesheet" href="../css/summary-dashboard.css" />
  </head>
  <body>
    <aside class="sidebar-placeholder">Sidebar Platzhalter</aside>
    <header class="header-placeholder">Header Platzhalter</header>
    <main class="content-area">
      <section class="summary-header">
        <h2>Join 360</h2>
        <div class="vertical-line"></div>
        <p>Key Metrics at a Glace</p>
      </section>
      <section class="summary-section">
        <div class="dashboard-grid">
          <div class="stats-section">
            <div class="top-row">
              <div class="summary-card">
                <div class="summary-card-content">
                  <img src="../assets/icons/summary-add-icon.svg" alt="" />
                  <div class="summary-card-span">
                    <span class="stat-number" data-field="todo">0</span>
                    <span class="stat-label">To-do</span>
                  </div>
                </div>
              </div>
              <div class="summary-card">
                <div class="summary-card-content">
                  <img src="../assets/icons/summary-done-icon.svg" alt="" />
                  <div class="summary-card-span">
                    <span class="stat-number" data-field="done">0</span>
                    <span class="stat-label">Done</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="urgent-row">
              <div class="summary-card-content">
                <img src="../assets/icons/summary-urgent-icon.svg" alt="" />
                <div class="summary-card-span">
                  <span class="stat-number" data-field="urgent">0</span>
                  <span class="stat-label">Urgent</span>
                </div>
              </div>
              <div class="urgent-divider"></div>
              <div class="urgent-right">
                <span class="deadline-date" data-field="deadline"></span>
                <span class="deadline-label">Upcoming Deadline</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

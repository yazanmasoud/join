<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/root.css" />
    <link rel="stylesheet" href="../css/imprint.css" />
    <link rel="stylesheet" href="../css/help.css" />
    <link rel="stylesheet" href="../css/privacy.css" />
    <link rel="stylesheet" href="../css/auth.css" />
    <link rel="stylesheet" href="../css/board.css" />
    <link rel="stylesheet" href="../css/btn.css" />

    <title>Join</title>
  </head>

  <body>
    <div class="layout-login">
      <header id="headerLoginContent" class="header-login-content">
        <!-- hier Header Template -->
      </header>

      <aside id="sidebarLoginContent" class="sidebar-login-content">
        <!-- hier Sidebar Template -->
      </aside>

      <main id="mainLoginContent" class="main-login-content">
        <!-- hier Content Window -->
      </main>
    </div>
    <!-- Firebase App (Basis-SDK) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <!-- Firebase Database -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <!-- Firebase Auth SDK (Wichtig gegen den "firebase.auth" Fehler!) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <!-- Logik & Module (Alle strictly als type="module") -->
    <script src="../js/firebase-config.js" type="module"></script>
    <script src="../js/utils.js" type="module"></script>
    <script src="../js/template.js" type="module"></script>
    <script src="../js/board.js" type="module"></script>
    <script src="../js/summary.js" type="module"></script>
    <script src="../js/task.js" type="module"></script>
    <script src="../js/contact.js" type="module"></script>
    <script src="../js/layout.js" type="module"></script>
    <script src="../js/main.js" type="module"></script>

    <!-- Startet die Login-Layout-Komponenten sicher -->
    <script type="module">
      if (typeof window.initLoginLayout === 'function') {
        window.initLoginLayout();
      }
    </script>
  </body>
</html>

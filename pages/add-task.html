<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add task</title>
    <link rel="stylesheet" href="../css/root.css" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/btn.css" />
    <link rel="stylesheet" href="../css/add-task.css" />
  </head>
  <body>
    <aside class="sidebar-placeholder">Sidebar Platzhalter</aside>
    <header class="header-placeholder">Header Platzhalter</header>
    <main class="content-area">
      <section class="summary-header">
        <h2>Add Task</h2>
        <div class="add-task">
          <div class="add-section-left">
            <div class="input-group">
              <label for="taskTitle"
                >Title<span class="required">*</span></label
              >
              <input type="text" id="taskTitle" placeholder="Enter a title" />
            </div>
            <div class="input-group">
              <label for="taskDescription">Description</label>
              <textarea
                id="taskDescription"
                placeholder="Enter a Description"
              ></textarea>
            </div>
            <div class="input-group">
              <label for="taskDate"
                >Due date<span class="required">*</span></label
              >
              <div class="input-wrapper">
                <input type="date" id="taskDate" placeholder="dd/mm/yyyy" />
                <button
                  type="button"
                  onclick="document.getElementById('taskDate').showPicker()"
                >
                  <img
                    src="../assets/icons/date-icon.svg"
                    alt="Kalender öffnen"
                  />
                </button>
              </div>
            </div>
          </div>
          <div class="vertical-divider"></div>
          <div class="add-section-left">
            <div class="input-group">
              <label>Priority</label>
              <div class="priority-btn-content" id="prioContainer"></div>
            </div>

            <div class="input-group">
              <label for="tasksAssigned">Assigned to</label>
              <select id="tasksAssigned">
                <option>Select contacts to assign</option>
              </select>
            </div>
            <div class="input-group">
              <label for="taskCategory"
                >Category<span class="required">*</span></label
              >
              <select id="taskCategory">
                <option>Select task category</option>
              </select>
            </div>
            <div class="input-group">
              <label for="subtasks">Subtasks</label>
              <input type="text" id="subtasks" placeholder="Add new subtask" />
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-secondary" onclick="clearForm()">
            Clear <span class="icon">x</span>
          </button>
          <button class="btn-primary" onclick="createTask()">
            Create Task <span class="icon">✓</span>
          </button>
        </div>
      </section>
    </main>
    <!-- Firebase App (Basis-SDK) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Firebase Database -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="../js/firebase-config.js"></script>
    <!--Logik -->
    <script src="../js/template.js"></script>
    <script src="../js/task.js"></script>
  </body>
</html>

<main class="content-area">
  <div class="add-task-page-header">
    <h2 id="addTaskHeadline">Add Task</h2>
    <button id="addTaskCloseBtn" class="add-task-close-btn d-none" onclick="closeAddTaskPage()">
      <img src="../assets/icons/close.svg" alt="Close" />
    </button>
  </div>
  <div class="add-task">
    <div class="add-section-left">
      <div class="input-group">
        <label for="taskTitle">Title<span class="required">*</span></label>
        <input
          type="text"
          id="taskTitle"
          placeholder="Enter a title"
          oninput="
            this.classList.remove('input-error');
            document.getElementById('error-taskTitle').classList.add('d-none');
          "
        />
        <div id="error-taskTitle" class="error-message d-none">This field is required</div>
      </div>
      <div class="input-group">
        <label for="taskDescription">Description</label>
        <textarea id="taskDescription" placeholder="Enter a Description"></textarea>
      </div>
      <div class="input-group">
        <label for="taskDate">Due date<span class="required">*</span></label>
        <div class="input-wrapper-task">
          <input
            type="date"
            id="taskDate"
            placeholder="dd/mm/yyyy"
            onchange="
              this.classList.remove('input-error');
              document.getElementById('error-taskDate').classList.add('d-none');
            "
          />
          <button type="button" onclick="document.getElementById('taskDate').showPicker()">
            <img src="../assets/icons/date-icon.svg" alt="Kalender öffnen" />
          </button>
        </div>
        <div id="error-taskDate" class="error-message d-none">This field is required</div>
      </div>
    </div>
    <div class="vertical-divider"></div>
    <div class="add-section-left">
      <div class="input-group">
        <label>Priority</label>
        <div class="priority-btn-content" id="prioContainer"></div>
      </div>
      <div class="input-group">
        <label for="assignedInput" class="input-group-label">Assigned to</label>
        <div class="multiselect-container">
          <div class="select-trigger-wrapper" id="assignedInputContainer">
            <input
              type="text"
              id="assignedInput"
              placeholder="Select contacts to assign"
              oninput="
                renderContacts(this.value);
                document.getElementById('contactList').classList.remove('d-none');
              "
              onclick="toggleContactList()"
            />
            <img src="../assets/icons/arrow-drop-down.svg" onclick="toggleContactList()" class="dropdown-arrow" />
          </div>
          <div id="contactList" class="dropdown-content d-none">
            <!-- Kontakte werden hier geladen -->
          </div>
        </div>
        <div id="assignedBadges" class="assigned-badges-container"></div>
      </div>
      <div class="input-group">
        <label for="categoryTrigger">Category<span class="required">*</span></label>
        <div class="multiselect-container">
          <div class="select-trigger-wrapper" id="categoryTrigger" onclick="toggleCategoryList(event)">
            <span id="categorySelectedText" class="category-placeholder">Select task category</span>
            <img src="../assets/icons/arrow-drop-down.svg" class="dropdown-arrow" />
          </div>
          <div id="categoryList" class="dropdown-content category-dropdown d-none"></div>
        </div>
        <input type="hidden" id="taskCategory" />
        <div id="error-taskCategory" class="error-message d-none">This field is required</div>
      </div>
      <div class="input-group">
        <label for="subtasks">Subtasks</label>
        <div class="subtask-input-wrapper">
          <input type="text" id="subtasks" placeholder="Add new subtask" onkeydown="handleSubtaskKey(event)" />
          <div class="subtask-input-actions">
            <button type="button" class="subtask-input-btn" onclick="clearSubtaskInput()" aria-label="Clear subtask input">
              <img src="../assets/icons/cancel-icon.svg" alt="" />
            </button>
            <span class="subtask-input-divider" aria-hidden="true">|</span>
            <button type="button" class="subtask-input-btn" onclick="addSubtaskFromInput()" aria-label="Add subtask">
              <img src="../assets/icons/subtask-check-icon.svg" alt="" />
            </button>
          </div>
        </div>
        <ul id="subtasksList" class="subtasks-item-list"></ul>
      </div>
    </div>
  </div>
  <div class="form-bottom">
    <p class="required-hint"><span class="required">*</span>This field is required</p>
    <div class="form-actions">
      <button type="button" class="btn-light" onclick="clearForm()">
        Clear <span></span>
        <img src="../assets/icons/cancle-icon.svg" alt="Verwerfe den Entwurf Button" />
      </button>
      <button type="submit" class="btn-dark" onclick="createTask()">
        Create Task
        <img src="../assets/icons/create-task.svg" alt="speichere den Task" />
      </button>
    </div>
  </div>
  <div id="successMessage" class="toast-message">
    <span>Task added to board</span>
    <img src="../assets/icons/nav-board-icon.svg" alt="" />
  </div>
</main>

<main class="content-area">
  <section class="summary-header">
    <h2>Join 360</h2>
    <div class="vertical-line"></div>
    <p>Key Metrics at a Glance</p>
  </section>

  <div class="dashboard-grid">
    <!-- Linke Spalte: Stats -->
    <div class="stats-section">
      <div class="top-row">
        <div class="card-base summary-card">
          <div class="summary-card-content">
            <img src="../assets/icons/summary-add-icon.svg" alt="Todo" />
            <div class="summary-card-info">
              <span class="stat-number" data-field="todo">0</span>
              <span class="stat-label">To-do</span>
            </div>
          </div>
        </div>
        <div class="card-base summary-card">
          <div class="summary-card-content">
            <img src="../assets/icons/summary-done-icon.svg" alt="Done" />
            <div class="summary-card-info">
              <span class="stat-number" data-field="done">0</span>
              <span class="stat-label">Done</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card-base urgent-row">
        <div class="summary-card-content">
          <img src="../assets/icons/summary-urgent-icon.svg" alt="Urgent" />
          <div class="summary-card-info">
            <span class="stat-number" data-field="urgent">0</span>
            <span class="stat-label">Urgent</span>
          </div>
        </div>
        <div class="urgent-divider"></div>
        <div class="urgent-right">
          <div class="deadline-date" data-field="deadline">
            October 16, 2023
          </div>
          <div>Upcoming Deadline</div>
        </div>
      </div>

      <div class="bottom-row">
        <div class="card-base summary-card-small">
          <span class="stat-number" data-field="tasksInBoard">0</span>
          <span class="stat-label">Tasks in Board</span>
        </div>
        <div class="card-base summary-card-small">
          <span class="stat-number" data-field="tasksInProgress">0</span>
          <span class="stat-label">Tasks in Progress</span>
        </div>
        <div class="card-base summary-card-small">
          <span class="stat-number" data-field="awaitingFeedback">0</span>
          <span class="stat-label">Awaiting Feedback</span>
        </div>
      </div>
    </div>

    <!-- Rechte Spalte: Greeting -->
    <div class="greeting-section desktop-greeting" id="greeting-container">
      <h2 class="greeting-time">Good morning,</h2>
      <h2 class="user-name-display" data-field="userName">Guest</h2>
    </div>

    <!-- Mobile Greeting Overlay -->
    <div class="mobile-greeting-overlay" id="mobile-greeting">
  <div class="mobile-greeting-content">
    <h2 class="greeting-time">Good morning,</h2>
    <h2 class="user-name-display" data-field="userName">Guest</h2>
  </div>
</div>

  </div>
</main>

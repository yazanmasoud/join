<main class="main-content">
  <section class="content-area">
    <div class="board-header">
      <div class="board-header-left">
        <h2>Board</h2>
        <button class="btn-dark hidden" id="add-task-btn-mobile" onclick="openAddTask()">
          <img src="../assets/icons/add.svg" alt="plus" />
        </button>
      </div>
      <p id="noSearchResults" class="no-search-results hidden">No search results. Clear search.</p>
      <div class="board-header-right">
        <div class="search-container">
          <input type="text" placeholder="Find Task" id="searchTask" />
        </div>

        <button class="btn-dark" id="add-task-btn" onclick="openAddTask()">Add task <img src="../assets/icons/add.svg" alt="plus" /></button>
      </div>
    </div>
    <div class="board-columns">
      <div class="column">
        <div class="column-header">
          <span>To do</span>
          <button class="add-task-small-btn" onclick="openAddTask('todo')">
            <img src="../assets/icons/board-add-icon.svg" alt="add" />
          </button>
        </div>
        <div
          class="task-container"
          id="todo"
          ondrop="moveTo('todo')"
          ondragover="
            allowDrop(event);
            highlight('todo');
          "
          ondragleave="removeHighlight('todo')"
        ></div>
      </div>

      <div class="column">
        <div class="column-header">
          <span>In progress</span>
          <button class="add-task-small-btn" onclick="openAddTask('progress')">
            <img src="../assets/icons/board-add-icon.svg" alt="add" />
          </button>
        </div>
        <div
          class="task-container"
          id="progress"
          ondrop="moveTo('progress')"
          ondragover="
            allowDrop(event);
            highlight('progress');
          "
          ondragleave="removeHighlight('progress')"
        ></div>
      </div>

      <div class="column">
        <div class="column-header">
          <span>Await feedback</span>
          <button class="add-task-small-btn" onclick="openAddTask('feedback')">
            <img src="../assets/icons/board-add-icon.svg" alt="add" />
          </button>
        </div>
        <div
          class="task-container"
          id="feedback"
          ondrop="moveTo('feedback')"
          ondragover="
            allowDrop(event);
            highlight('feedback');
          "
          ondragleave="removeHighlight('feedback')"
        ></div>
      </div>

      <div class="column">
        <div class="column-header">
          <span>Done</span>
        </div>
        <div
          class="task-container"
          id="done"
          ondrop="moveTo('done')"
          ondragover="
            allowDrop(event);
            highlight('done');
          "
          ondragleave="removeHighlight('done')"
        ></div>
      </div>
    </div>
  </section>
</main>
<dialog id="taskDetailDialog" class="detail-dialog-frame">
  <div id="taskDetailContent" class="task-detail-content-style">
    <!-- Hier wird das Template eingefügt -->
  </div>
</dialog>
<div id="successMessage" class="success-toast d-none">
  <span>Task added to board</span>
  <img src="../assets/icons/create-task.svg" alt="erstelle Task" />
</div>
